# clients.conf — StaySuite RADIUS Clients

# Localhost for testing
client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
}

# All IPv4 clients on local network
client localnet {
    ipaddr = 0.0.0.0/0
    secret = testing123
    limit {
        max_connections = 256
        lifetime = 0
        idle_timeout = 900
    }
}


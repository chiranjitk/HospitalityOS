# clients.conf — StaySuite RADIUS Clients
#
# NOTE: NAS clients are loaded from SQL (nas table) via read_clients = yes.
# Only the catch-all localnet entry is defined here for fallback.

# All IPv4 clients on local network (catch-all for any NAS not in SQL)
client localnet {
    ipaddr = 0.0.0.0/0
    secret = testing123
    limit {
        max_connections = 256
        lifetime = 0
        idle_timeout = 900
    }
}

### STAYSUITE_MANAGED_CLIENTS_BEGIN ###
# NAS clients are loaded from SQL (nas table) via read_clients = yes.
# DO NOT add client definitions here — they will duplicate the SQL entries.
# Active clients: Aruba Controller - Conference (10.0.1.2), MikroTik Router - Main (10.0.1.1), Cryptsk Gateway (Multimode) (127.0.0.1)
### STAYSUITE_MANAGED_CLIENTS_END ###

# >>> StaySuite Managed NAS Clients BEGIN <<<

# NAS Client: 10.20.30.10 — 1222
client 5545 {
    ipaddr = 10.20.30.10
    secret = "test"
    shortname = 5545
    nas_type = other
    require_message_authenticator = yes
    limit_proxy_state = yes
    response_window = 6
}

# >>> StaySuite Managed NAS Clients END <<<

# clients.conf — StaySuite RADIUS Clients

# Localhost for testing
client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
}

# All IPv4 clients on local network
client localnet {
    ipaddr = 0.0.0.0/0
    secret = testing123
    limit {
        max_connections = 256
        lifetime = 0
        idle_timeout = 900
    }
}

### STAYSUITE_MANAGED_CLIENTS_BEGIN ###
# NAS clients are loaded from SQL (nas table) via read_clients = yes.
# DO NOT add client definitions here — they will duplicate the SQL entries.
# Active clients: Aruba Controller - Conference (10.0.1.2), MikroTik Router - Main (10.0.1.1), Cryptsk Multimode Gateway — built-in system NAS (127.0.0.1)
### STAYSUITE_MANAGED_CLIENTS_END ###

# >>> StaySuite Managed NAS Clients BEGIN <<<

# NAS Client: 10.0.1.1 — MikroTik Router - Main
client mikrotik-main {
    ipaddr = 10.0.1.1
    secret = "nas_secret_mikrotik_1"
    shortname = mikrotik-main
    coa_port = 1812
    nas_type = mikrotik
    require_message_authenticator = yes
    limit_proxy_state = yes
    response_window = 6
}


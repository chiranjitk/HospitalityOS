#!/bin/bash
# =============================================================================
# StaySuite HospitalityOS - Production Environment Configuration
# =============================================================================
# Source this file before running any deployment script:
#   source production-env.conf
#
# Auto-detects paths for:
#   - Rocky Linux 10 / RHEL 9+ (dnf-installed PG 17 + FR 3.x)
#   - Debian 13+ (apt-installed PG 17 + FR 3.x)
#   - Sandbox / Custom compiled installations
# =============================================================================

set -euo pipefail

# -- Detect OS ----------------------------------------------------------------
detect_os() {
    if [ -f /etc/rocky-release ]; then
        echo "rocky"
    elif [ -f /etc/redhat-release ]; then
        echo "rhel"
    elif [ -f /etc/debian_version ]; then
        echo "debian"
    elif [ -f /etc/lsb-release ] 2>/dev/null; then
        echo "ubuntu"
    else
        echo "unknown"
    fi
}

OS_TYPE=$(detect_os)
echo "[StaySuite] Detected OS: $OS_TYPE"

# -- Detect PostgreSQL Installation --------------------------------------------
detect_pg_path() {
    # Custom compile locations
    if [ -x /home/z/pgsql-17/bin/pg_config ]; then
        echo "/home/z/pgsql-17"; return
    fi
    if [ -x /usr/pgsql-17/bin/pg_config ]; then
        echo "/usr/pgsql-17"; return
    fi
    if [ -x /usr/lib/postgresql/17/bin/pg_config ]; then
        echo "/usr/lib/postgresql/17"; return
    fi
    # Fallback: system pg_config
    if command -v pg_config &>/dev/null; then
        dirname "$(dirname "$(which pg_config)")"; return
    fi
    echo ""
}

PG_HOME=$(detect_pg_path)
if [ -n "$PG_HOME" ]; then
    export PATH="$PG_HOME/bin:$PATH"
    PG_BIN="$PG_HOME/bin"
    PG_CONFIG="$PG_BIN/pg_config"
    echo "[StaySuite] PostgreSQL found at: $PG_HOME"
else
    echo "[StaySuite] WARNING: PostgreSQL not found!"
    PG_BIN=""
    PG_CONFIG=""
fi

# -- Detect FreeRADIUS Installation -------------------------------------------
detect_fr_path() {
    if [ -x /home/z/freeradius-install/sbin/radiusd ]; then
        echo "/home/z/freeradius-install"; return
    fi
    if [ -x /usr/sbin/radiusd ] || [ -x /usr/sbin/freeradius ]; then
        echo "/usr"; return
    fi
    echo ""
}

FR_HOME=$(detect_fr_path)
if [ -n "$FR_HOME" ]; then
    if [ -d /home/z/freeradius-install/etc/raddb ]; then
        FR_CONF="/home/z/freeradius-install/etc/raddb"
    elif [ -d /etc/raddb ]; then
        FR_CONF="/etc/raddb"
    elif [ -d /etc/freeradius ]; then
        FR_CONF="/etc/freeradius"
    else
        FR_CONF=""
    fi
    echo "[StaySuite] FreeRADIUS config at: $FR_CONF"
else
    echo "[StaySuite] WARNING: FreeRADIUS not found!"
    FR_CONF=""
fi

# FR binary name
if command -v radiusd &>/dev/null; then
    FR_BIN="radiusd"
elif command -v freeradius &>/dev/null; then
    FR_BIN="freeradius"
else
    FR_BIN="radiusd"
fi

# -- Database Connection Parameters (EDIT THESE FOR PRODUCTION) ----------------
DB_HOST="${STAYSUITE_DB_HOST:-localhost}"
DB_PORT="${STAYSUITE_DB_PORT:-5432}"
DB_NAME="${STAYSUITE_DB_NAME:-staysuite}"
DB_USER="${STAYSUITE_DB_USER:-z}"
DB_PASSWORD="${STAYSUITE_DB_PASSWORD:-}"

if [ -n "$DB_PASSWORD" ]; then
    DATABASE_URL="postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"
    FR_RADIUS_DB="dbname=${DB_NAME} host=${DB_HOST} port=${DB_PORT} user=${DB_USER} password=${DB_PASSWORD}"
    PG_CONN="-h $DB_HOST -p $DB_PORT -U $DB_USER -d $DB_NAME"
else
    DATABASE_URL="postgresql://${DB_USER}@${DB_HOST}:${DB_PORT}/${DB_NAME}"
    FR_RADIUS_DB="dbname=${DB_NAME} host=${DB_HOST} port=${DB_PORT} user=${DB_USER}"
    PG_CONN="-h $DB_HOST -p $DB_PORT -U $DB_USER -d $DB_NAME"
fi

# -- Application Settings -----------------------------------------------------
APP_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
NEXTJS_PORT="${STAYSUITE_PORT:-3000}"

# -- Export all variables -----------------------------------------------------
export OS_TYPE PG_HOME PG_BIN PG_CONFIG FR_HOME FR_CONF FR_BIN
export DB_HOST DB_PORT DB_NAME DB_USER DB_PASSWORD
export DATABASE_URL FR_RADIUS_DB PG_CONN
export APP_DIR NEXTJS_PORT

# -- Summary ------------------------------------------------------------------
echo ""
echo "========================================================================"
echo "       StaySuite - Environment Configuration"
echo "========================================================================"
echo "  OS:           $OS_TYPE"
echo "  PostgreSQL:   ${PG_HOME:-NOT FOUND}"
echo "  FreeRADIUS:   ${FR_HOME:-NOT FOUND} (${FR_BIN})"
echo "  FR Config:    ${FR_CONF:-NOT FOUND}"
echo "  Database:     $DB_NAME @ $DB_HOST:$DB_PORT"
echo "  DB User:      $DB_USER"
echo "  App Dir:      $APP_DIR"
echo "  Next.js Port: $NEXTJS_PORT"
echo "========================================================================"
echo ""

# -- Helper Functions ---------------------------------------------------------

check_pg() {
    "$PG_BIN/pg_isready" -h "$DB_HOST" -p "$DB_PORT" >/dev/null 2>&1
}

check_fr() {
    pgrep -x "$FR_BIN" >/dev/null 2>&1
}

run_psql() {
    "$PG_BIN/psql" $PG_CONN "$@"
}

run_psql_file() {
    "$PG_BIN/psql" $PG_CONN -f "$1"
}

fr_debug() {
    echo "[StaySuite] Starting FreeRADIUS in debug mode..."
    "$FR_HOME/sbin/$FR_BIN" -X -l stdout
}

fr_restart() {
    echo "[StaySuite] Restarting FreeRADIUS..."
    if [ "$OS_TYPE" = "rocky" ] || [ "$OS_TYPE" = "rhel" ]; then
        systemctl restart radiusd
    elif [ "$OS_TYPE" = "debian" ] || [ "$OS_TYPE" = "ubuntu" ]; then
        systemctl restart freeradius
    else
        if [ -x "$FR_HOME/sbin/rc.radiusd" ]; then
            "$FR_HOME/sbin/rc.radiusd" restart
        else
            echo "[StaySuite] Cannot auto-restart. Run: $FR_HOME/sbin/$FR_BIN"
        fi
    fi
}

# -- Path Reference Table -----------------------------------------------------
# Component       | Rocky 10 (dnf)                     | Sandbox (source)
# ----------------|-------------------------------------|-----------------------------------
# FR binary       | /usr/sbin/radiusd                   | /home/z/freeradius-install/sbin/radiusd
# FR config       | /etc/raddb/                         | /home/z/freeradius-install/etc/raddb/
# FR logs         | /var/log/radiusd/                   | /home/z/freeradius-install/var/log/radiusd/
# PG binary       | /usr/pgsql-17/bin/                  | /home/z/pgsql-17/bin/
# PG data         | /var/lib/pgsql/17/data/             | /home/z/pgsql-17/data/
# PG config       | /var/lib/pgsql/17/data/postgresql.conf

# StaySuite DEV dnsmasq Configuration (Sandbox)
# ============================================================
# DNS-only mode for sandbox testing.
# DHCP configs validated separately via: dnsmasq -C dnsmasq.conf --test
#
# Usage: ./production-dnsmasq/src/dnsmasq -C etc/dnsmasq-dev.conf
# ============================================================

# === General Settings ===
domain-needed
bogus-priv
no-resolv
no-poll
strict-order

# === Logging ===
log-facility=/home/z/my-project/production-dnsmasq/logs/dnsmasq.log
log-queries

# === PID File ===
pid-file=/home/z/my-project/production-dnsmasq/run/dnsmasq.pid

# === DHCP Settings (no binding — sandbox) ===
dhcp-leasefile=/home/z/my-project/production-dnsmasq/leases/dnsmasq.leases
no-dhcp-interface=lo

# === Listen Settings (non-privileged port for sandbox) ===
port=5353
listen-address=127.0.0.1
bind-interfaces

# === DNS Settings ===
server=8.8.8.8
server=8.8.4.4
server=1.1.1.1

# === Include DNS config from dns-service only (DNS works in sandbox) ===
conf-dir=/home/z/my-project/dns-local

# NOTE: dhcp-local/staysuite-dhcp.conf is NOT included here
# because dhcp-range needs real network interfaces (192.168.x.x).
# Validate DHCP config syntax with:
#   ./src/dnsmasq -C etc/dnsmasq.conf --test

# StaySuite Production dnsmasq Configuration (v2.90)
# ============================================================
# This is the MAIN config loaded on production (Rocky 10).
# dnsmasq runs as root on port 53 with full DHCP + DNS.
# ============================================================

# === General Settings ===
domain-needed
bogus-priv
no-resolv
no-poll
strict-order

# === Logging ===
log-facility=/home/z/my-project/production-dnsmasq/logs/dnsmasq.log
log-queries
log-dhcp

# === PID File ===
pid-file=/home/z/my-project/production-dnsmasq/run/dnsmasq.pid

# === DHCP Settings ===
dhcp-leasefile=/home/z/my-project/production-dnsmasq/leases/dnsmasq.leases

# === Listen Settings ===
# Production: port 53, listen on all interfaces
# port=53
# listen-address=0.0.0.0
# bind-interfaces

# === DNS Settings ===
server=8.8.8.8
server=8.8.4.4
server=1.1.1.1

# === Include generated configs from mini-services ===
conf-dir=/home/z/my-project/dhcp-local
conf-dir=/home/z/my-project/dns-local

# StaySuite Production dnsmasq Configuration
# Dnsmasq version 2.90

# === General Settings ===
domain-needed
bogus-priv
no-resolv
no-poll
strict-order

# === Logging ===
log-facility=/home/z/my-project/production-dnsmasq/logs/dnsmasq.log
log-queries
log-dhcp

# === PID File ===
pid-file=/home/z/my-project/production-dnsmasq/dnsmasq.pid

# === DHCP Settings ===
# Lease file
dhcp-leasefile=/home/z/my-project/production-dnsmasq/leases/dnsmasq.leases

# DHCP range (defaults, will be overridden by dhcp-service generated config)
# dhcp-range=192.168.1.100,192.168.1.250,12h

# === DNS Settings ===
# Upstream DNS servers
server=8.8.8.8
server=8.8.4.4
server=1.1.1.1

# Local domain
local=/staysuite.local/

# Listen address (use non-privileged port for sandbox testing, change to 53 on production)
port=5353
listen-address=127.0.0.1
bind-interfaces

# === Include generated config from dhcp-service ===
# conf-dir=/home/z/my-project/production-dnsmasq/etc/dnsmasq.d/

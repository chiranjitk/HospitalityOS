# =============================================================================
# StaySuite-HospitalityOS — Filter Group 2 (basic)
# =============================================================================
# Moderate filtering — for standard/business WiFi plans
# Blocks: adult, gambling, malware, phishing, violence, ads
# =============================================================================

# Filter group name — used in logs and block pages
groupname = 'basic'

# Storyboard for this group
storyboard = '/home/z/my-project/e2guardian-install/etc/e2guardian/e2guardian/group2.story'

# List directory for this group
.Define LISTDIR </home/z/my-project/e2guardian-install/etc/e2guardian/e2guardian/lists/group2>

# Naughtyness limit — moderate threshold for general audience
naughtynesslimit = 100

# Weighted phrase mode — singular (each unique phrase counts once)
weightedphrasemode = 2


# =============================================================================
# MITM — SNI-only mode (default for StaySuite)
# =============================================================================

sslmitm = off

sitelist = 'name=nocheckcert,path=__LISTDIR__/nocheckcertsitelist'
ipsitelist = 'name=nocheckcert,path=__LISTDIR__/nocheckcertsiteiplist'

sitelist = 'name=greyssl,path=__LISTDIR__/greysslsitelist'
ipsitelist = 'name=greyssl,path=__LISTDIR__/greysslsiteiplist'

sitelist = 'name=localgreyssl,path=__LISTDIR__/localgreysslsitelist'


# =============================================================================
# URL MAIN LISTS
# =============================================================================

sitelist = 'name=semiexception,messageno=602,path=__LISTDIR__/semiexceptionsitelist'

# ulogd.conf - StaySuite HospitalityOS (Production)
# Compiled from source: ulogd-2.0.9
# With custom PRINTSNI filter for TLS SNI extraction
#
# Standard FHS paths:
#   Binary  : /usr/local/sbin/ulogd
#   Plugins : /usr/local/lib/ulogd/
#   Config  : /usr/local/etc/ulogd.conf
#   Logs    : /var/log/ulogd2/

[global]
logfile="/var/log/ulogd2/ulogd.log"
loglevel=5

#############################################################
# PLUGINS (explicit absolute paths — overrides compile-time prefix)
#############################################################

# Input plugins
plugin="/usr/local/lib/ulogd/ulogd_inppkt_NFLOG.so"
plugin="/usr/local/lib/ulogd/ulogd_inpflow_NFCT.so"

# Filter plugins
plugin="/usr/local/lib/ulogd/ulogd_raw2packet_BASE.so"
plugin="/usr/local/lib/ulogd/ulogd_filter_IFINDEX.so"
plugin="/usr/local/lib/ulogd/ulogd_filter_IP2STR.so"
plugin="/usr/local/lib/ulogd/ulogd_filter_HWHDR.so"
plugin="/usr/local/lib/ulogd/ulogd_filter_PRINTFLOW.so"
plugin="/usr/local/lib/ulogd/ulogd_filter_PRINTSNI.so"

# Output plugins
plugin="/usr/local/lib/ulogd/ulogd_output_JSON.so"
plugin="/usr/local/lib/ulogd/ulogd_output_PCAP.so"

#############################################################
# STACK DEFINITIONS
#############################################################

# Stack 1: Connection tracking flow logging (NFCT -> JSON)
stack=ct1:NFCT,ct_ip:IP2STR,ct_print:PRINTFLOW,ct_json:JSON

# Stack 2: Packet logging (NFLOG -> JSON)
# nftables: nft add rule inet mangle prerouting log group 10
stack=pkt1:NFLOG,pkt_base:BASE,pkt_if:IFINDEX,pkt_ip:IP2STR,pkt_mac:HWHDR,pkt_json:JSON

# Stack 3: TLS SNI extraction (NFLOG -> BASE -> IP2STR -> IFINDEX -> PRINTSNI -> JSON)
# nftables: nft add rule inet mangle prerouting tcp dport 443 tcp flags & (syn|rst|fin) == 0 log group 20 snaplen 1500
# Added BASE+IP2STR+IFINDEX to capture source/dest IP and interface name
stack=sni:NFLOG,sni_base:BASE,sni_ip:IP2STR,sni_if:IFINDEX,sni_sni:PRINTSNI,sni_json:JSON

# Stack 4: Raw TLS PCAP capture (DISABLED — would conflict with Stack 3 on group 20)
# Each NFLOG group allows only ONE listener. To re-enable, use a unique group:
#   1. Change sni_pcap group to 23
#   2. Add nftables rule: nft add rule inet mangle prerouting tcp dport 443 tcp flags & (syn|rst|fin) == 0 log group 23 snaplen 1500
# stack=sni_pcap:NFLOG,sni_pcap_base:BASE,sni_pcap_out:PCAP

#############################################################
# STACK 1: FLOW LOGGING (NFCT -> JSON)
#############################################################

[ct1]

[ct_json]
file="/var/log/ulogd2/flow.json"
sync=1
timestamp=1

#############################################################
# STACK 2: PACKET LOGGING (NFLOG -> JSON)
#############################################################

[pkt1]
group=10

[pkt_json]
file="/var/log/ulogd2/packet.json"
sync=1
timestamp=1

#############################################################
# STACK 3: TLS SNI EXTRACTION (NFLOG -> PRINTSNI -> JSON)
#############################################################

[sni]
group=20

[sni_json]
file="/var/log/ulogd2/sni.json"
sync=1
timestamp=1

#############################################################
# STACK 4: RAW TLS PCAP CAPTURE (DISABLED — see above)
#############################################################
# [sni_pcap]
# group=23
#
# [sni_pcap_out]
# file="/var/log/ulogd2/sni_raw.pcap"
# sync=1

# ulogd.conf - StaySuite HospitalityOS
# Compiled from source: ulogd-2.0.9
# With custom PRINTSNI filter for TLS SNI extraction
#
# All plugins and binaries at: /home/z/my-project/tools/ulogd-build/install/

[global]
logfile="/home/z/my-project/tools/ulogd-build/log/ulogd.log"
loglevel=5

#############################################################
# PLUGINS
#############################################################

# Input plugins
plugin="/home/z/my-project/tools/ulogd-build/install/lib/ulogd/ulogd_inppkt_NFLOG.so"
plugin="/home/z/my-project/tools/ulogd-build/install/lib/ulogd/ulogd_inpflow_NFCT.so"

# Filter plugins
plugin="/home/z/my-project/tools/ulogd-build/install/lib/ulogd/ulogd_raw2packet_BASE.so"
plugin="/home/z/my-project/tools/ulogd-build/install/lib/ulogd/ulogd_filter_IFINDEX.so"
plugin="/home/z/my-project/tools/ulogd-build/install/lib/ulogd/ulogd_filter_IP2STR.so"
plugin="/home/z/my-project/tools/ulogd-build/install/lib/ulogd/ulogd_filter_HWHDR.so"
plugin="/home/z/my-project/tools/ulogd-build/install/lib/ulogd/ulogd_filter_PRINTFLOW.so"
plugin="/home/z/my-project/tools/ulogd-build/install/lib/ulogd/ulogd_filter_PRINTSNI.so"

# Output plugins
plugin="/home/z/my-project/tools/ulogd-build/install/lib/ulogd/ulogd_output_JSON.so"
plugin="/home/z/my-project/tools/ulogd-build/install/lib/ulogd/ulogd_output_PCAP.so"

#############################################################
# STACK DEFINITIONS
#############################################################

# Stack 1: Connection tracking flow logging (NFCT -> JSON)
# Logs: flow start/end, src/dst IP:port, bytes, packets
stack=ct1:NFCT,ct_ip:IP2STR,ct_print:PRINTFLOW,ct_json:JSON

# Stack 2: Packet logging with JSON output (NFLOG -> parsed -> JSON)
# Logs: all packet metadata (IP, TCP/UDP, MAC) to JSON
# Uses NFLOG group 10 - set up iptables rule:
#   iptables -I FORWARD -j NFLOG --nflog-group 10
stack=pkt1:NFLOG,pkt_base:BASE,pkt_if:IFINDEX,pkt_ip:IP2STR,pkt_mac:HWHDR,pkt_json:JSON

# Stack 3: TLS SNI extraction (NFLOG -> SNI parser -> JSON)
# Extracts TLS Server Name Indication from ClientHello packets
# Uses NFLOG group 20 - set up iptables rule to capture TLS traffic:
#   iptables -I FORWARD -p tcp --dport 443 -j NFLOG --nflog-group 20
#   iptables -I FORWARD -p tcp --sport 443 -j NFLOG --nflog-group 20
stack=sni:NFLOG,sni_sni:PRINTSNI,sni_json:JSON

# Stack 4: Raw TLS packets to PCAP (for deeper analysis)
# Captures raw packet data to PCAP file
# Uses NFLOG group 20 (shared with SNI stack)
stack=sni_pcap:NFLOG,sni_pcap_base:BASE,sni_pcap_out:PCAP

#############################################################
# STACK 1: FLOW LOGGING (NFCT -> JSON)
#############################################################

[ct1]

[ct_json]
file="/home/z/my-project/tools/ulogd-build/log/flow.json"
sync=1
timestamp=1

#############################################################
# STACK 2: PACKET LOGGING (NFLOG -> JSON)
#############################################################

[pkt1]
group=10
# Set to 1 to include raw packet data
# raw_enable=1

[pkt_json]
file="/home/z/my-project/tools/ulogd-build/log/packet.json"
sync=1
timestamp=1

#############################################################
# STACK 3: TLS SNI EXTRACTION (NFLOG -> PRINTSNI -> JSON)
#############################################################

[sni]
group=20

[sni_json]
file="/home/z/my-project/tools/ulogd-build/log/sni.json"
sync=1
timestamp=1

#############################################################
# STACK 4: RAW TLS PCAP CAPTURE
#############################################################

[sni_pcap]
group=20

[sni_pcap_out]
file="/home/z/my-project/tools/ulogd-build/log/sni_raw.pcap"
sync=1

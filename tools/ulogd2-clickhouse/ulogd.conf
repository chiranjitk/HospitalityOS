##############################################################################
#  ulogd2 Configuration — StaySuite-HospitalityOS
#
#  Pipeline Architecture:
#
#    Stack (sni_capture):
#      nftables NFLOG group 20 (TCP port 443 data packets — ClientHello)
#        → NFLOG input → BASE (raw packet parser) → IFINDEX → HWHDR → JSON
#        → /var/log/ulogd/json/sni-queries.log
#
#    IMPORTANT: The nftables rule does NOT use "ct state new" because:
#      - "ct state new" matches only the TCP SYN packet (60 bytes, no payload)
#      - The TLS ClientHello (with SNI) arrives AFTER the 3-way handshake
#        in a data-carrying ACK packet (~200-500 bytes)
#      - Rule uses: tcp flags & (fin|syn|rst) == 0 tcp length > 0
#
#    sni-parser (port 3022) reads the JSON log:
#      - Parses raw packet payload (raw.pkt hex) → extracts TLS SNI
#      - Writes enriched records to ClickHouse ipdr.sni_log
#
#  IMPORTANT: ulogd2 2.0.8 config format:
#    1. Load plugins in [global] via plugin="full/path/to/file.so"
#    2. Define stacks via stack="inst:PLUGIN,inst:PLUGIN,..." in [global]
#    3. Plugin parameters go in separate [instancename] sections
#    4. BASE plugin is REQUIRED to parse raw packets into fields
##############################################################################

[global]
logfile="/var/log/ulogd/ulogd2.log"
loglevel=5
pidfile="/run/ulogd2.pid"

# Load plugins (full path to .so files)
plugin="/usr/local/ulogd2/lib/ulogd/ulogd_inppkt_NFLOG.so"
plugin="/usr/local/ulogd2/lib/ulogd/ulogd_raw2packet_BASE.so"
plugin="/usr/local/ulogd2/lib/ulogd/ulogd_filter_IFINDEX.so"
plugin="/usr/local/ulogd2/lib/ulogd/ulogd_filter_HWHDR.so"
plugin="/usr/local/ulogd2/lib/ulogd/ulogd_output_JSON.so"

# Stack definition: instance_name:PLUGIN_NAME (order = data flow)
# NFLOG input → BASE (raw→fields) → IFINDEX (iface name) → HWHDR (MAC) → JSON output
stack=log1:NFLOG,base1:BASE,ifi1:IFINDEX,hwhdr1:HWHDR,json1:JSON

# ───────────────────────────────────────────────────────────────────────────
# NFLOG input plugin instance — listens on netfilter NFLOG group 20
#
# nftables rule in defaultchains_cryptsk.sh:
#   nft 'insert rule inet mangle prerouting tcp dport 443 \
#        tcp flags \& (fin|syn|rst) == 0 tcp length > 0 \
#        log group 20 snaplen 1500 prefix "NFLOG_SNI: "'
# ───────────────────────────────────────────────────────────────────────────

[log1]
group=20
buflen=128
sockbufsize=262144

# ───────────────────────────────────────────────────────────────────────────
# JSON output plugin instance — writes one JSON object per line
# sni-parser watches this file and extracts TLS SNI from raw.pkt
# ───────────────────────────────────────────────────────────────────────────

[json1]
file="/var/log/ulogd/json/sni-queries.log"
sync=0

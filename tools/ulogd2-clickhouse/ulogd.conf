##############################################################################
#  ulogd2 Configuration — StaySuite-HospitalityOS
#
#  Pipeline Architecture:
#
#    Stack 1 (sni_capture):
#      nftables NFLOG group 20 (TCP port 443 SYN)
#        → ulogd2 NFLOG input
#        → IFINDEX filter (interface name)
#        → HWHDR filter (hardware headers)
#        → JSON output → /var/log/ulogd/json/sni-queries.log
#
#    sni-parser (port 3022) reads the JSON log:
#      - Parses raw packet payload (raw.pkt hex) → extracts TLS SNI
#      - Writes enriched records to ClickHouse ipdr.sni_log
#
#  Stack 2 (conntrack) — DISABLED by default:
#    conntrack-bridge (port 3020) already handles ipdr.nat_log
#    via 'conntrack -E'. This stack is here for future reference.
#
#  IMPORTANT: This config expects ulogd2 built with:
#    ulogd_inppkt_NFLOG.so, ulogd_filter_IFINDEX.so,
#    ulogd_filter_HWHDR.so, ulogd_output_JSON.so
##############################################################################

[global]
# Global logfile for ulogd2 daemon itself (not packet logs)
logfile="/var/log/ulogd/ulogd2.log"
loglevel=5
plugin_dir="/usr/local/ulogd2/lib/ulogd"
stackdirs="/usr/local/ulogd2/lib/ulogd"
pidfile="/var/run/ulogd2.pid"

# ───────────────────────────────────────────────────────────────────────────
# STACK 1: SNI Capture (NFLOG group 20 → JSON)
#
# nftables rule in defaultchains_cryptsk.sh:
#   nft 'add rule inet mangle prerouting tcp dport 443 ct state new \
#        log group 20 snaplen 1500 prefix "NFLOG_SNI: "'
#
# This captures TCP SYN packets to port 443 (TLS ClientHello)
# with up to 1500 bytes of payload. ulogd2 writes one JSON line per
# packet to /var/log/ulogd/json/sni-queries.log.
#
# The sni-parser service reads this file and extracts TLS SNI
# from the raw packet payload (raw.pkt field in hex).
# ───────────────────────────────────────────────────────────────────────────

[stack1]
# NFLOG input: listens on netfilter NFLOG group 20
# bindaddr=0.0.0.0 (local), group=20, nlgroup=20
input=NFLOG
# NFLOG group number (must match nftables rule)
group=20
# Netlink multicast group
nlgroup=20
# Number of packets to buffer before processing
buflen=128
# Socket receive buffer size
sockbufsize=262144

# Filter: Extract interface index/name
filter=IFINDEX

# Output: JSON-lines format (one JSON object per line)
# sni-parser reads this format and extracts SNI from raw.pkt
output=JSON
# Output file path — sni-parser watches this file
file="/var/log/ulogd/json/sni-queries.log"
# Sync mode: 0=none, 1=sync each write (slower but safer)
sync=0
# Timestamp format in JSON: unix or iso
timestamp=unix

# ───────────────────────────────────────────────────────────────────────────
# STACK 2: Conntrack (DISABLED — conntrack-bridge handles this)
#
# Uncomment to enable direct conntrack → ClickHouse via ulogd2.
# conntrack-bridge (port 3020) already does this via 'conntrack -E',
# so this stack is disabled by default to avoid duplicate data.
#
# [stack2]
# input=NFCT
# output=JSON
# file="/var/log/ulogd/json/nfct-events.log"
# sync=0
# timestamp=unix
# ───────────────────────────────────────────────────────────────────────────

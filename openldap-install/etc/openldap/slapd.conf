# StaySuite OpenLDAP Configuration
# Enterprise AAA for FreeRADIUS Integration

include         /home/z/my-project/openldap-install/etc/openldap/schema/core.schema
include         /home/z/my-project/openldap-install/etc/openldap/schema/cosine.schema
include         /home/z/my-project/openldap-install/etc/openldap/schema/inetorgperson.schema
include         /home/z/my-project/openldap-install/etc/openldap/schema/nis.schema
include         /home/z/my-project/openldap-install/etc/openldap/schema/samba.schema

pidfile         /home/z/my-project/openldap-install/var/run/slapd.pid
argsfile        /home/z/my-project/openldap-install/var/run/slapd.args

# Module path
modulepath      /home/z/my-project/openldap-install/libexec/openldap
moduleload      back_mdb

# Listen only on localhost (port 3890 to avoid needing root for 389)
# Using -h flag in startup command instead: slapd -h "ldap://127.0.0.1:3890"

# TLS (disabled for local testing)
# TLSCACertFile   /home/z/my-project/openldap-install/etc/openldap/tls/ca.crt
# TLSCertFile     /home/z/my-project/openldap-install/etc/openldap/tls/server.crt
# TLSKeyFile      /home/z/my-project/openldap-install/etc/openldap/tls/server.key

#######################################################################
# MDB database definitions
#######################################################################
database        mdb
maxsize         1073741824
suffix          "dc=staysuite,dc=local"
rootdn          "cn=admin,dc=staysuite,dc=local"
rootpw          {SSHA}nGorbE5WGF/4d8jLttiUlNVeYgftA31y

# Data directory
directory       /home/z/my-project/openldap-install/var/openldap-data

# Indexes for fast FreeRADIUS lookups
index           objectClass           eq
index           uid                   eq,pres
index           cn                    eq,pres,sub
index           memberUid             eq
index           entryUUID             eq
index           uniqueMember          eq

# Access controls
access to attrs=userPassword
        by self                write
        by dn.exact="cn=admin,dc=staysuite,dc=local" write
        by anonymous           auth
        by *                   none

access to *
        by dn.exact="cn=admin,dc=staysuite,dc=local" write
        by *                   read

[global]
    workgroup = STAYSUITE
    realm = STAYSUITE.LOCAL
    server string = StaySuite Samba (LDAP passdb)
    security = USER
    
    # Use LDAP as passdb backend
    passdb backend = ldapsam:ldap://127.0.0.1:3890
    
    # LDAP settings for passdb
    ldap admin dn = cn=admin,dc=staysuite,dc=local
    ldap suffix = dc=staysuite,dc=local
    ldap user suffix = ou=People
    ldap group suffix = ou=Groups
    ldap machine suffix = ou=Devices
    ldap idmap suffix = ou=Idmap
    ldap delete dn = no
    
    # LDAP password sync
    ldap password sync = yes
    ldap ssl = no
    
    # Winbind settings (not joining domain, just local)
    winbind use default domain = yes
    winbind enum users = yes
    winbind enum groups = yes
    
    # Logging
    log level = 1
    log file = /home/z/my-project/samba-install/var/log/samba/log.%m
    max log size = 50
    
    # PID and lock directories
    pid directory = /home/z/my-project/samba-install/var/run/samba
    lock directory = /home/z/my-project/samba-install/var/lock/samba
    state directory = /home/z/my-project/samba-install/var/lib/samba
    cache directory = /home/z/my-project/samba-install/var/cache/samba
    private dir = /home/z/my-project/samba-install/var/lib/samba/private
    
    # Disable unnecessary services
    interfaces = lo 127.0.0.1
    bind interfaces only = yes
    disable netbios = yes
    
    # Map LDAP attributes for NT passwords
    # Samba needs NT/LM password hashes stored in LDAP sambaSamAccount
    ldap passwd sync = no
